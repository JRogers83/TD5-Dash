# TD5 Dash — LZDoom Player 1 config
# Minimal overrides from LZDoom defaults. Joystick JS:0 active, JS:1 axes disabled.

[GlobalSettings]
use_joystick=true
joy_background=true
vid_activeinbackground=true
i_soundinbackground=true
i_pauseinbackground=false
vid_fullscreen=false
vid_defwidth=640
vid_defheight=400

[Doom.Bindings]
Joy1=weapnext
Joy2=+attack
Joy3=+use
Joy4=weapprev
Joy5=+strafe
Joy6=+speed
Joy7=
Joy8=
Joy9=togglemap
Joy10=menu_main

[Joy:JS:0]
Axis0deadzone=0.15
Axis0type=0
Axis0multiplier=1.0
Axis1deadzone=0.15
Axis1type=2
Axis1multiplier=-1.0

[Joy:JS:1]
Axis0deadzone=0.15
Axis0type=-1
Axis1deadzone=0.15
Axis1type=-1
