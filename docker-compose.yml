services:
  td5-dash:
    build: .
    ports:
      - "8000:8000"
    env_file: .env          # all variables from .env are passed into the container
    environment:
      - DEV_MODE=1          # seeds all page toggles as enabled on every startup
    volumes:
      # Live-reload mounts: edit files locally, changes reflect instantly
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # --reload watches for Python file changes in development
    command: ["python", "-m", "uvicorn", "main:app",
              "--host", "0.0.0.0", "--port", "8000", "--reload"]
